<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFER Reading Builder</title>
  <link rel="stylesheet" href="./css/styles.css?v=3.4.3" />
  <link rel="stylesheet" href="" id="themeStylesheet" />
</head>
<body data-page="dashboard">
  <header class="site-header">
    <div class="header-row">
      <h1>NFER Reading Builder</h1>
      <button type="button" id="settingsToggleBtn" class="icon-btn" title="Settings">⚙️</button>
    </div>
  </header>

  <aside class="settings-panel" id="settingsPanel" hidden>
    <div class="settings-header"><h3>Settings</h3><button type="button" id="settingsCloseBtn" class="icon-btn" title="Close settings">✕</button></div>
    <label>Passage text size <input id="passageFontRange" type="range" min="0.9" max="1.5" step="0.05" /></label>
    <label>Answer text size <input id="inputFontRange" type="range" min="0.95" max="1.45" step="0.05" /></label>
    <label class="toggle"><input id="hideMarksToggle" type="checkbox" /> Hide marks per question</label>
    <label class="toggle"><input id="gentleModeToggle" type="checkbox" /> Use gentler wording</label>
    <button type="button" id="saveSettingsBtn">Save settings</button>
  </aside>

  <main class="container">
    <section class="card">
      <h2>Assessment Dashboard</h2>
      <p id="libraryMeta">Loading library...</p>
      <p id="dashboardError" class="error"></p>

      <div class="library-row">
        <label for="libraryFile">Assessment file</label>
        <select id="libraryFile">
          <option value="/data/year4_combined_50_test_library_v3.json">Year 4 combined 50 tests (v3)</option>
        </select>
        <input id="libraryPathInput" type="text" placeholder="/data/your_other_library.json" autocomplete="off" />
        <button id="applyLibraryBtn" type="button">Load File</button>
      </div>

      <div class="actions">
        <button id="generateBtn">Start Recommended Test</button>
        <button id="randomBtn" type="button">Random Test</button>
        <a class="button-link action-btn" href="./tracker.html">Progress Tracker</a>
      </div>
    </section>

    <section class="card">
      <h3>Next Recommended Test</h3>
      <p id="recommendedMeta">No recommendation yet.</p>
    </section>

    <section class="card">
      <h3>Recent Scores</h3>
      <p id="recentScores">No attempts yet.</p>
      <h3>Weak Domains</h3>
      <p id="weakDomains">No weak domains identified yet.</p>
    </section>
  </main>

  <footer class="site-footer">
    <p id="versionInfo">Version</p>
    <label for="themeSelect">Style</label>
    <select id="themeSelect">
      <option value="default">Default</option>
      <option value="ocean">Ocean Night</option>
      <option value="paper">Paper Garden</option>
      <option value="split">Split Panel</option>
      <option value="arcade">Arcade Grid</option>
      <option value="zen210">Zen 210</option>
    </select>
  </footer>

  <script type="module" src="./js/app.js?v=3.4.3"></script>
</body>
</html>
