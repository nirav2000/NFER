<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generated Test</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="stylesheet" href="" id="themeStylesheet" />
</head>
<body data-page="test">
  <header class="site-header">
    <div class="header-row">
      <h1>Generated Test</h1>
      <div class="header-tools" aria-label="Test display options">
        <button type="button" id="toggleTimerProgressBtn" class="icon-btn" title="Toggle timer and progress" aria-pressed="true">🕒</button>
        <button type="button" id="toggleAllQuestionsBtn" class="icon-btn" title="Toggle show all questions" aria-pressed="false">📄</button>
      </div>
    </div>
    <nav>
      <a href="./index.html">← Dashboard</a>
      <a href="./tracker.html">Progress Tracker</a>
    </nav>
  </header>

  <main class="container">
    <section class="card" id="testMeta"></section>

    <section class="card timer-card">
      <div class="row-between">
        <p><strong>Time Remaining:</strong> <span id="timerText">35:00</span></p>
        <p id="progressText">Question 1 of 1</p>
      </div>
      <div class="progress-track" aria-hidden="true">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </section>

    <section class="card">
      <h2>Passage 1</h2>
      <article id="passage1"></article>
    </section>

    <section class="card">
      <h2>Passage 2</h2>
      <article id="passage2"></article>
    </section>

    <section class="card" id="questionCard">
      <div class="row-between">
        <h2>Question</h2>
        <label class="toggle"><input type="checkbox" id="schemeToggle" /> Show Mark Scheme</label>
      </div>
      <form id="answersForm"></form>
      <div class="actions question-actions">
        <button type="button" id="submitNowBtn" hidden>Submit & Mark</button>
        <button type="button" id="prevBtn">Previous</button>
        <button type="button" id="skipBtn">Skip for now</button>
        <button type="button" id="nextBtn">Next</button>
        <button type="button" id="reviewBtn">Review Answers</button>
      </div>
    </section>

    <section class="card" id="reviewCard" hidden>
      <h2>Review Answers</h2>
      <p>Check the status of each question before submitting.</p>
      <div id="reviewList"></div>
      <div class="actions">
        <button type="button" id="backToQuestionsBtn">Back to Questions</button>
        <button type="button" id="submitTestBtn">Submit & Mark</button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p id="versionInfo">Version</p>
    <label for="themeSelect">Style</label>
    <select id="themeSelect">
      <option value="default">Default</option>
      <option value="ocean">Ocean Night</option>
      <option value="paper">Paper Garden</option>
    </select>
  </footer>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
